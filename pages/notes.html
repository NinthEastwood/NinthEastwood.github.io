<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的笔记</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }
        nav {
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        nav a {
            margin-right: 20px;
            text-decoration: none;
            color: #0366d6;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .note-content {
            background-color: #f6f8fa;
            padding: 20px;
            border-radius: 5px;
            line-height: 1.8;
        }
        .note-content h1, .note-content h2 {
            color: #24292e;
            border-bottom: 1px solid #e1e4e8;
            padding-bottom: 5px;
        }
        .note-content code {
            background-color: #f3f3f3;
            padding: 2px 6px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">首页</a>
        <a href="about.html">自我介绍</a>
        <a href="hobbies.html">兴趣爱好</a>
        <a href="notes.html">笔记</a>
    </nav>

    <h1>📝 我的笔记</h1>
    
    <div class="note-content" id="noteContent">
        加载中...
    </div>

    <script>
        fetch('jojo7.md')
            .then(response => response.text())
            .then(data => {
                document.getElementById('noteContent').innerHTML = marked.parse(data);
            })
            .catch(error => {
                document.getElementById('noteContent').innerText = '加载失败：' + error;
            });
    </script>
</body>
</html>
