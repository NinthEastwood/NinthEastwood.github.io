<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 | 探索工程与交互的边界</title>
    <style>
        /* 全局样式 - 考虑到你的高度近视，使用了高对比度和较大的字体 */
        :root {
            --bg-color: #0f172a;
            --text-color: #e2e8f0;
            --accent-color: #38bdf8;
            --card-bg: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid #334155;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        /* 主体内容布局 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 6rem 2rem 2rem;
        }

        section {
            margin-bottom: 5rem;
            padding-top: 2rem;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--accent-color);
            padding-left: 1rem;
            color: var(--accent-color);
        }

        /* 欢迎区域 */
        .hero {
            text-align: center;
            padding: 4rem 0;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            color: #94a3b8;
        }

        /* 卡片样式 - 用于项目、博客等 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        /* 技能标签 */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .tag {
            background: #0ea5e922;
            color: var(--accent-color);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid var(--accent-color);
        }

        footer {
            text-align: center;
            padding: 4rem;
            color: #64748b;
            font-size: 0.9rem;
        }

        /* 手机端适配 */
        @media (max-width: 600px) {
            .nav-links { display: none; } /* 手机端简化导航 */
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="logo">Hello World.</div>
            <ul class="nav-links">
                <li><a href="#about">关于</a></li>
                <li><a href="#skills">技能</a></li>
                <li><a href="#projects">项目</a></li>
                <li><a href="#blog">博客</a></li>
                <li><a href="#notes">笔记</a></li>
                <li><a href="#hobbies">爱好</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
            

        <!-- 博客 -->
        <section id="blog">
          <h2>技术文章</h2>
          <h5>学习是个很好玩的事情</h5>
            <div class="grid">
                <div class="card" style="border-left: 2px solid var(--accent-color);">
                    <h4>学习总结</h4>
                    <p style="font-size: 0.8rem;">2023-10-27</p>
                </div>
                <div class="card" style="border-left: 2px solid var(--accent-color);">
                    <h4>HCI 与物理世界的碰撞</h4>
                    <p style="font-size: 0.8rem;">2023-10-25</p>
                </div>
            </div>

            
          <h2>生活随笔</h2>
          <h5>个人感受与生活经历总结</h5>
            <div class="grid">
                <div class="card" style="border-left: 2px solid var(--accent-color);">
                    <h4>《飙马野郎》观后感</h4>
                    <p style="font-size: 0.8rem;">2023-10-27</p>
                </div>
                <div class="card" style="border-left: 2px solid var(--accent-color);">
                    <h4>《迷宫饭》观后感</h4>
                    <p style="font-size: 0.8rem;">2023-10-25</p>
                </div>
            </div>


            
          
        </section>

        

      

    </div>

    <footer>
        <p>&copy; 2023 Designed by [你的名字]. 基于对工程的热爱与探索.</p>
    </footer>

</body>
</html>
